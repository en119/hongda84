<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雲端對帳監督系統</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="記帳監督">

    <style>
        :root { --primary: #4a90e2; --income: #2ecc71; --expense: #e74c3c; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .balance-board { background: #333; color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .balance-amount { font-size: 32px; font-weight: bold; margin: 5px 0; color: #f1c40f; }
        .init-section { background: #fff9db; padding: 12px; border: 1px solid #f1c40f; border-radius: 10px; margin-bottom: 15px; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
        .init-section input { width: 110px; padding: 8px; border-radius: 6px; border: 1px solid #ccc; text-align: right; font-size: 16px; font-weight: bold; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #f9f2ff; padding: 10px; border-radius: 10px; }
        .full-width { grid-column: span 2; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 5px; }
        button { padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-income { background: var(--income); }
        .btn-expense { background: var(--expense); }
        .btn-clear { background: #ff4d4d; font-size: 12px; padding: 5px 10px; border-radius: 5px; } /* 清除鍵樣式 */
        .sync-status { text-align: center; font-size: 10px; color: #999; margin-bottom: 10px; }
        .history { height: 350px; overflow-y: auto; border-top: 1px solid #eee; margin-top: 10px; }
        .item { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #f9f9f9; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="sync-status" id="syncStatus">☁️ 雲端同步中...</div>
    <div class="balance-board">
        <div style="font-size:14px; opacity:0.8;">錢包應有金額 (理論餘額)</div>
        <div class="balance-amount" id="currentBalance">$ 0</div>
    </div>

    <div class="init-section">
        <strong>💰 本週起始金額：</strong>
        <div>
            <input type="number" id="startBalance" value="0" onchange="refreshUI()" inputmode="decimal">
            <span style="font-weight:bold;"> 元</span>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="itemName" class="full-width" placeholder="品項名稱">
        <input type="number" id="itemPrice" class="full-width" placeholder="金額" inputmode="decimal">
        <button class="btn-income" onclick="handleAdd('收入')">＋ 收入</button>
        <button class="btn-expense" onclick="handleAdd('支出')">－ 支出</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong style="font-size:14px;">最近雲端紀錄</strong>
        <div>
            <button class="btn-clear" onclick="clearCloudData()">🗑️ 清除紀錄</button>
            <button onclick="fetchCloudData()" style="background:none; color:var(--primary); font-size:12px; width:auto; padding:0; text-decoration:underline; margin-left:10px;">🔄 手動整理</button>
        </div>
    </div>
    <div id="historyList" class="history"></div>
</div>

<script>
    // --- 這裡要確保網址是對的 ---
    const G_FORM_URL = "https://docs.google.com/forms/u/0/d/e/1FAIpQLSdL0eLpcL1I9Hhu8FH7fds2jBIhRW2T_aRyE7tSnDA-_tAZpQ/formResponse";
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbykTzmBtV4Qi8yh8h-2h4YtwNIJKHqyxvLE3EpIM835pBqYh_gR3Eo18mpjQz9dw-JQ/exec"; 

    let cloudRecords = [];
    document.getElementById('startBalance').value = localStorage.getItem('cloud_start_amount') || 0;

    async function fetchCloudData() {
        document.getElementById('syncStatus').innerText = "☁️ 正在抓取雲端資料...";
        try {
            const response = await fetch(CLOUD_API_URL);
            cloudRecords = await response.json();
            refreshUI();
            document.getElementById('syncStatus').innerText = "✅ 已與雲端同步";
        } catch (e) {
            document.getElementById('syncStatus').innerText = "❌ 同步失敗";
        }
    }

    function handleAdd(type) {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        if (!name || !price) { alert("內容填完再按啦！"); return; }
        const formData = new URLSearchParams();
        formData.append("entry.254688195", name);
        formData.append("entry.166850842", type);
        formData.append("entry.2093753088", price);
        fetch(G_FORM_URL, { method: "POST", mode: "no-cors", body: formData }).then(() => {
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('syncStatus').innerText = "🚀 上傳中...";
            setTimeout(fetchCloudData, 2000);
        });
    }

    // 新增：清除雲端紀錄功能
    async function clearCloudData() {
        if (confirm("卓恩，確定要清空所有雲端紀錄嗎？（清除後無法復原喔！）")) {
            document.getElementById('syncStatus').innerText = "🧹 正在清空雲端...";
            try {
                await fetch(CLOUD_API_URL, { method: "POST", mode: "no-cors" });
                alert("已成功清空！");
                fetchCloudData(); // 重新整理畫面
            } catch (e) {
                alert("清除失敗，請檢查設定");
            }
        }
    }

    function refreshUI() {
        const startAmount = parseFloat(document.getElementById('startBalance').value) || 0;
        localStorage.setItem('cloud_start_amount', startAmount);
        const listDiv = document.getElementById('historyList');
        let currentTotal = startAmount;

        // 反轉陣列讓最新資料顯示在最上面
        listDiv.innerHTML = cloudRecords.slice().reverse().map(r => {
            const p = parseFloat(r.price) || 0;
            if (r.type === '收入') currentTotal += p; else currentTotal -= p;
            return `<div class="item"><div><b>${r.name}</b><br><small>${r.time}</small></div><b style="color:${r.type==='收入'?'var(--income)':'var(--expense)'}">${r.type==='收入'?'+':'-'}$${p}</b></div>`;
        }).join('');

        // 計算總額時要按原始順序跑一次
        let finalBalance = startAmount;
        cloudRecords.forEach(r => {
            const p = parseFloat(r.price) || 0;
            if (r.type === '收入') finalBalance += p; else finalBalance -= p;
        });

        document.getElementById('currentBalance').innerText = `$ ${finalBalance.toLocaleString()}`;
    }

    fetchCloudData();
</script>
</body>
</html>
