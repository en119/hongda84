<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 我們的小金庫</title>
    <link rel="manifest" href="manifest_shared.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --shared: #9b59b6; --income: #2ecc71; --expense: #e74c3c; --bg: #fdfaf3; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .balance-board { background: #333; color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .balance-amount { font-size: 32px; font-weight: bold; margin: 5px 0; color: #f1c40f; }
        .input-group { background: #f9f0ff; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 14px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        button:active { opacity: 0.7; }
        .btn-inc { background: var(--income); }
        .btn-exp { background: var(--expense); }
        .history { height: 350px; overflow-y: auto; border-top: 1px solid #eee; margin-top: 10px; }
        .item { display: flex; justify-content: space-between; padding: 15px 5px; border-bottom: 1px solid #f9f9f9; align-items: center; }
        .user-tag { font-size: 11px; color: var(--shared); border: 1px solid var(--shared); padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-top: 4px; display: inline-block; }
        .sync-status { text-align: center; font-size: 10px; color: #999; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="sync-status" id="syncStatus">☁️ 雲端同步中...</div>
    <div class="balance-board">
        <div style="font-size:14px; opacity:0.8;">共用帳戶當前餘額</div>
       <div class="balance-board">
        <div style="font-size:14px; opacity:0.8;">共用帳戶當前餘額</div>
        <div class="balance-amount" id="totalBalance">$ 0</div>
        
        <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2);">
            <div style="font-size: 12px; opacity: 0.9; margin-bottom: 5px;">共同帳戶轉帳資訊</div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <code id="bankInfo" style="background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 5px; font-size: 14px;">
                    (013) 國泰世華 125506233868
                </code>
                <button onclick="copyBankInfo()" style="width: auto; padding: 5px 10px; font-size: 12px; background: #f1c40f; color: #333;">複製</button>
            </div>
        </div>
    </div>
    </div>

    <div class="input-group">
        <input type="text" id="itemName" placeholder="項目 (如：房租、公費存入)">
        <input type="number" id="itemPrice" placeholder="金額" inputmode="decimal">
        
        <select id="payUser">
            <option value="蔡卓恩">操作者：蔡卓恩</option>
            <option value="吳弘達">操作者：吳弘達</option>
        </select>
        
        <div class="btn-group">
            <button class="btn-inc" onclick="submitData('收入')">＋ 存入</button>
            <button class="btn-exp" onclick="submitData('支出')">－ 支出</button>
        </div>
    </div>

    <div style="font-size:14px; font-weight:bold;">最近帳戶明細</div>
    <div id="historyList" class="history"></div>
</div>

<script>
    // ======= 請填入新共用表單的資訊 =======
    const G_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScv1RDI7TyPPuQb_QlB7_Rh2WEIP4q6-8AC6oOOIMZDm4it9A/formResponse";
    const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbyHwij641XamJgCGd3gKo1BO50DRfgpAZ4DTpxbmxe490apYdcpreOeH4Nfo3jlpjouQQ/exec"; // <--- 記得換成新的 API 網址
    const ID_NAME = "entry.693835429"; 
    const ID_TYPE = "entry.1877176608";
    const ID_PRICE = "entry.1236593110";
    const ID_USER = "entry.1639575585";

    async function fetchData() {
        document.getElementById('syncStatus').innerText = "☁️ 正在抓取雲端資料...";
        try {
            const res = await fetch(CLOUD_API_URL);
            const data = await res.json();
            let balance = 0;
            document.getElementById('historyList').innerHTML = data.map(r => {
                const p = parseFloat(r.price) || 0;
                if (r.type === '收入') balance += p; else balance -= p;
                
                return `<div class="item">
                    <div>
                        <b>${r.name}</b> <span class="user-tag">${r.user}</span>
                        <div style="font-size:10px; color:#999;">${r.time}</div>
                    </div>
                    <span style="font-weight:bold; color:${r.type==='收入'?'var(--income)':'var(--expense)'}">
                        ${r.type==='收入'?'+':'-'}$${p.toLocaleString()}
                    </span>
                </div>`;
            }).join('');
            document.getElementById('totalBalance').innerText = `$ ${balance.toLocaleString()}`;
            document.getElementById('syncStatus').innerText = "✅ 已同步";
        } catch(e) { 
            document.getElementById('syncStatus').innerText = "❌ 連線失敗，請檢查 API"; 
        }
    }

    function submitData(type) {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const user = document.getElementById('payUser').value;
        if(!name || !price) { alert("請填寫品項與金額！"); return; }

        const formData = new URLSearchParams();
        formData.append(ID_NAME, name);
        formData.append(ID_PRICE, price);
        formData.append(ID_USER, user);
        formData.append(ID_TYPE, type);

        fetch(G_FORM_URL, { method: "POST", mode: "no-cors", body: formData })
        .then(() => {
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            document.getElementById('syncStatus').innerText = "🚀 上傳中...";
            setTimeout(fetchData, 2000);
        });
    }
    // 一鍵複製銀行帳號的功能
function copyBankInfo() {
    // 請在這裡修改成你們實際的銀行資訊
    const bankText = "中國信託 (822) 帳號：123456789012"; 
    
    navigator.clipboard.writeText(bankText).then(() => {
        alert("帳號已複製！可以去轉帳囉 💸");
    }).catch(err => {
        // 備用方案：如果手機瀏覽器不支援 clipboard API
        const textArea = document.createElement("textarea");
        textArea.value = bankText;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy");
        document.body.removeChild(textArea);
        alert("帳號已複製！");
    });
}
    fetchData();
</script>
</body>
</html>
